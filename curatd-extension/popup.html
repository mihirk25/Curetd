<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curatd Clipper</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 320px;
        min-height: 160px;
        background: #000000;
        color: #e4e4e7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
      }
      .wrap {
        padding: 16px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 18px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.04em;
      }
      h1 span {
        color: #22c55e;
      }
      .state {
        display: none;
      }
      .state.visible {
        display: block;
      }
      .logged-in-row {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px;
        border-radius: 10px;
        background: #09090b;
        border: 1px solid #27272a;
      }
      .check-icon {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(34, 197, 94, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #22c55e;
      }
      .logged-in-text {
        margin: 0;
        font-size: 13px;
        line-height: 1.45;
        color: #d4d4d8;
        word-break: break-word;
      }
      .logged-in-text strong {
        color: #ffffff;
        font-weight: 600;
      }
      .hint {
        margin: 12px 0 0;
        font-size: 11px;
        color: #52525b;
        line-height: 1.4;
      }
      .sign-in-msg {
        margin: 0 0 14px;
        font-size: 13px;
        line-height: 1.5;
        color: #a1a1aa;
      }
      button {
        width: 100%;
        padding: 10px 14px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .btn-primary {
        background: #22c55e;
        color: #000000;
      }
      .btn-primary:hover {
        background: #4ade80;
      }
      .loading {
        margin: 0;
        font-size: 13px;
        color: #71717a;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>CURAT<span>D</span> Clipper</h1>

      <div id="state-loading" class="state visible">
        <p class="loading">Checking your Curatd session…</p>
      </div>

      <div id="state-logged-in" class="state">
        <div class="logged-in-row">
          <div class="check-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path
                d="M5 12.5 9.5 17 19 7"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <p class="logged-in-text" id="user-label"></p>
        </div>
        <p class="hint">Open any YouTube video and click &ldquo;Save to Curatd&rdquo; below the title.</p>
      </div>

      <div id="state-logged-out" class="state">
        <p class="sign-in-msg">Please sign in at curatd.live first</p>
        <button type="button" class="btn-primary" id="open-curatd-btn">Open curatd.live</button>
        <p class="hint">After signing in, click the extension icon again to refresh.</p>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
