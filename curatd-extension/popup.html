<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curatd Clipper</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 320px;
        min-height: 200px;
        background: #000000;
        color: #e4e4e7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
      }
      .wrap {
        padding: 16px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 18px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.04em;
      }
      h1 span {
        color: #22c55e;
      }
      .sub {
        margin: 0 0 16px;
        font-size: 12px;
        color: #71717a;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 600;
        color: #a1a1aa;
      }
      input {
        width: 100%;
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #3f3f46;
        background: #09090b;
        color: #fafafa;
        font-size: 14px;
        outline: none;
      }
      input:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.25);
      }
      button {
        width: 100%;
        padding: 10px 14px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .btn-primary {
        background: #22c55e;
        color: #000000;
      }
      .btn-primary:hover {
        background: #4ade80;
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .btn-ghost {
        margin-top: 8px;
        background: transparent;
        color: #a1a1aa;
        border: 1px solid #3f3f46;
      }
      .btn-ghost:hover {
        color: #ffffff;
        border-color: #52525b;
      }
      .error {
        margin: 0 0 12px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #fca5a5;
        font-size: 12px;
        display: none;
      }
      .error.visible {
        display: block;
      }
      .logged-in {
        display: none;
      }
      .logged-in.visible,
      .logged-out.visible {
        display: block;
      }
      .logged-out {
        display: none;
      }
      .user-email {
        margin: 0 0 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #09090b;
        border: 1px solid #27272a;
        font-size: 13px;
        color: #d4d4d8;
        word-break: break-all;
      }
      .hint {
        margin-top: 12px;
        font-size: 11px;
        color: #52525b;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>CURAT<span>D</span> Clipper</h1>
      <p class="sub">Sign in to save clips from YouTube</p>

      <p id="error" class="error" role="alert"></p>

      <div id="logged-out" class="logged-out visible">
        <form id="login-form">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" required placeholder="you@example.com" />
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required placeholder="Password" />
          <button type="submit" class="btn-primary" id="login-btn">Sign in</button>
        </form>
      </div>

      <div id="logged-in" class="logged-in">
        <p class="user-email" id="user-label"></p>
        <button type="button" class="btn-ghost" id="logout-btn">Sign out</button>
        <p class="hint">Open any YouTube video and click &ldquo;Save to Curatd&rdquo; below the title.</p>
      </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="firebase-rest.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
